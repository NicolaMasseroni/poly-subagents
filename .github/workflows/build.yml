name: Build and push subagent images

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest -q

  build-market-analyst:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: ts
        run: echo "stamp=$(date -u +%Y%m%d%H%M)" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.market-analyst
          push: true
          tags: |
            ghcr.io/nicolamasseroni/poly-market-analyst:main-${{ steps.ts.outputs.stamp }}
            ghcr.io/nicolamasseroni/poly-market-analyst:main
          labels: org.opencontainers.image.source=https://github.com/NicolaMasseroni/poly-subagents
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-news-analyst:
