    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        run: |
          STAMP=$(date -u +%Y%m%d%H%M)
          IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/poly-trader
          docker build -t $IMAGE:main-$STAMP -t $IMAGE:main -f Dockerfile.trader .
          docker push $IMAGE:main-$STAMP
          docker push $IMAGE:main
