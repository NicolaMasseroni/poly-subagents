      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.news-analyst
          push: true
          tags: |
            ghcr.io/nicolamasseroni/poly-news-analyst:main-${{ steps.ts.outputs.stamp }}
            ghcr.io/nicolamasseroni/poly-news-analyst:main
          labels: org.opencontainers.image.source=https://github.com/NicolaMasseroni/poly-subagents
