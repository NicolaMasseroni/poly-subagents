    needs: lint-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        run: |
          STAMP=$(date -u +%Y%m%d%H%M)
          IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/poly-portfolio-manager
          docker build -t $IMAGE:main-$STAMP -t $IMAGE:main -f Dockerfile.portfolio-manager .
          docker push $IMAGE:main-$STAMP
          docker push $IMAGE:main

  build-risk-manager:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
